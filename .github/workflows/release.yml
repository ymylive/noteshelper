name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.4"

      - name: Recreate platform files
        working-directory: frontend
        run: flutter create --org com.noteshelper --project-name noteshelper .

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build web
        working-directory: frontend
        run: flutter build web

      - name: Zip web build
        run: cd frontend/build && zip -r ../../noteshelper-web.zip web/

      - uses: actions/upload-artifact@v4
        with:
          name: noteshelper-web
          path: noteshelper-web.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.4"

      - name: Recreate platform files
        working-directory: frontend
        run: flutter create --org com.noteshelper --project-name noteshelper .

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build APK
        working-directory: frontend
        run: flutter build apk --release

      - name: Copy APK
        run: cp frontend/build/app/outputs/flutter-apk/app-release.apk noteshelper-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: noteshelper-android
          path: noteshelper-android.apk

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.4"

      - name: Recreate platform files
        working-directory: frontend
        run: flutter create --org com.noteshelper --project-name noteshelper .

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build macOS
        working-directory: frontend
        run: flutter build macos --release

      - name: Zip macOS app
        run: |
          cd frontend/build/macos/Build/Products/Release
          zip -r ../../../../../../noteshelper-macos.zip noteshelper.app/

      - uses: actions/upload-artifact@v4
        with:
          name: noteshelper-macos
          path: noteshelper-macos.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.4"

      - name: Recreate platform files
        working-directory: frontend
        run: flutter create --org com.noteshelper --project-name noteshelper .

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build Windows
        working-directory: frontend
        run: flutter build windows --release

      - name: Zip Windows build
        run: Compress-Archive -Path frontend/build/windows/x64/runner/Release/* -DestinationPath noteshelper-windows.zip

      - uses: actions/upload-artifact@v4
        with:
          name: noteshelper-windows
          path: noteshelper-windows.zip

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.4"

      - name: Recreate platform files
        working-directory: frontend
        run: flutter create --org com.noteshelper --project-name noteshelper .

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build iOS
        working-directory: frontend
        run: flutter build ios --release --no-codesign

      - name: Zip iOS app
        run: |
          cd frontend/build/ios/iphoneos
          zip -r ../../../../noteshelper-ios.zip Runner.app/

      - uses: actions/upload-artifact@v4
        with:
          name: noteshelper-ios
          path: noteshelper-ios.zip

  release:
    name: Create Release
    needs:
      - build-web
      - build-android
      - build-macos
      - build-windows
      - build-ios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/noteshelper-web.zip
            artifacts/noteshelper-android.apk
            artifacts/noteshelper-macos.zip
            artifacts/noteshelper-windows.zip
            artifacts/noteshelper-ios.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
