name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.27.4"

      - name: Recreate platform files
        working-directory: frontend
        run: flutter create --org com.noteshelper --project-name noteshelper .

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Analyze
        working-directory: frontend
        run: flutter analyze --no-fatal-infos

      - name: Test
        working-directory: frontend
        run: flutter test
